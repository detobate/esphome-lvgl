lvgl:
  top_layer:
    widgets:
    
      # Temperature
      - label:
          text: "-°C / -°C"
          id: temperatures
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      # Clock
      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF

      # Wifi
      - label:
          text: "$wifi"
          id: display_wifi_icon
          styles: icon_font
          align: top_right
          x: 0
          y: 4
          text_align: left
          text_color: 0xFFFFFF
      - label:
          text: "---%"
          id: display_wifi
          styles: roboto15_style
          align: top_right
          x: 0
          y: 4
          text_align: right
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout: 
        type: flex
        flex_flow: column_wrap
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 30
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:
        # A1
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_a1
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_a1_icon
                  text: $lightbulb
              - label:
                  align: bottom_left
                  id: button_a1_label
                  text: "Living Room Bright"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: scene.living_room_bright

        # A2
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_a2
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_a2_icon
                  text: $nightlight
              - label:
                  align: bottom_left
                  id: button_a2_label
                  text: "Living Room Low"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: scene.living_room_dimmed

        # A3
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_a3
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_a3_icon
                  text: $nightlight
              - label:
                  align: bottom_left
                  id: button_a3_label
                  text: "Living Room Dim"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: scene.living_room_super_low

        # A4
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_a4
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_a4_icon
                  text: $lightbulb_off
              - label:
                  align: bottom_left
                  id: button_a4_label
                  text: "Living Room Off"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: scene.living_room_off_scene

        # B1
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_b1
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "B1"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "100"

        # B2
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_b2
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "B2"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "66"

        # B3
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_b3
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "B3"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "33"

        # B4
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_b4
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_closed
              - label:
                  align: bottom_left
                  text: "B4"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "0"


        # C1
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_c1
            styles: control
            widgets:
              # Icon (shown when OFF)
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_c1_icon
                  text: $printer
              # Progress (shown when ON)
              - obj:
                  align: top_left
                  id: button_c1_container
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  widgets:
                    - label:
                        text_font: roboto36_font
                        text_color: 0xFFFFFF
                        id: print_progress_label
                        text: "--"
                    - label:
                        text_font: roboto17_font
                        text_color: 0xFFFFFF
                        text: "%"
              - label:
                  align: bottom_left
                  text: "C1"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_3d_printer_power

        # C2
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_c2
            styles: control
            widgets:
              # Icon (shown when OFF)
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_c2_icon
                  text: $filament
              # Humidity (shown when ON)
              - obj:
                  align: top_left
                  id: button_c2_container
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  widgets:
                    - label:
                        text_font: roboto36_font
                        text_color: 0xFFFFFF
                        id: dryer_humidity_label
                        text: "--"
                    - label:
                        text_font: roboto17_font
                        text_color: 0xFFFFFF
                        text: "%"
              - label:
                  align: bottom_left
                  text: "C2"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_filament_heater_893b

        # C3
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_c3
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $aircon
              - label:
                  align: bottom_left
                  text: "C3"
            on_click:
              - homeassistant.service:
                  service: script.office_air_conditioner

        # C4
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_c4
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_c4_icon
                  text: $battery
              - label:
                  align: bottom_left
                  id: button_c4_label
                  text: "C4"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.battery_charger

        # D1
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_d1
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_d1_icon
                  text: $package
              - label:
                  align: bottom_left
                  id: button_d1_label
                  text: "D1"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.office_storage

        # D2
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_d2
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_d2_icon
                  text: $network
              - label:
                  align: bottom_left
                  id: button_d2_label
                  text: "D2"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.office_network_rack

        # D3
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_d3
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_d3_icon
                  text: $package
              - label:
                  align: bottom_left
                  id: button_d3_label
                  text: "D3"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.office_storage

        #
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: button_d4
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: button_d4_icon
                  text: $network
              - label:
                  align: bottom_left
                  id: button_d4_label
                  text: "D4"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.office_network_rack