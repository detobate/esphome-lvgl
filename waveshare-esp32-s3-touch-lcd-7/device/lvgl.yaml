lvgl:
  top_layer:
    widgets:
    
      # Temperature
      - label:
          text: "-°C / -°C"
          id: temperatures
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      # Clock
      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF

     # Wifi Container
      - obj:
          align: top_right
          x: -8
          y: 4
          width: SIZE_CONTENT
          height: SIZE_CONTENT
          bg_opa: TRANSP
          border_width: 0
          pad_all: 0
          layout:
            type: flex
            flex_flow: row
          widgets:
            - label:
                text: "$wifi"
                id: display_wifi_icon
                styles: icon_font_small_style
                text_color: 0xFFFFFF
            - label:
                text: "---%"
                id: display_wifi
                styles: roboto15_style
                text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout: 
        type: flex
        flex_flow: column_wrap
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 30
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:
        # A1
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: button_a1
            styles: control
            widgets:
              - label:
                  text_font: $icon_font_large
                  align: center
                  id: button_a1_icon
                  text: $power
            on_click:
              - homeassistant.action:
                  action: automation.trigger
                  data:
                    entity_id: automation.lgtv_power_toggle

        # A2
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: false
            id: button_a2
            styles: control
            widgets:
              - label:
                  text_font: $icon_font_large
                  align: center
                  id: button_a2_icon
                  text: $volume_plus
            on_click:
              - homeassistant.action:
                  action: automation.trigger
                  data:
                    entity_id: automation.sonos_volumeup


        # A3
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: false
            id: button_a3
            styles: control
            widgets:
              - label:
                  text_font: $icon_font_large
                  align: center
                  id: button_a3_icon
                  text: $volume_minus
            on_click:
